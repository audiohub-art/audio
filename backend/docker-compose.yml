version: '3'

services:
  database:
    image: postgres:18
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: audio
    volumes:
      - data:/var/lib/postgresql
    networks:
      - backend-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U username -d audio"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  minio:
    image: minio/minio
    environment:
      - MINIO_ROOT_USER=root
      - MINIO_ROOT_PASSWORD=passwordroot
      - MINIO_DEFAULT_BUCKETS=audio
    networks:
      - minio-network
      - backend-network
    volumes:
      - minio-volume:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    command: [ "server", "--console-address", ":9001", "/data" ]

volumes:
  data:
  minio-volume:
    driver: local

networks:
  minio-network:
    driver: bridge
  backend-network:
    driver: bridge
