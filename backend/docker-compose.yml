version: '3'

services:
  database:
    image: postgres:18
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: username
      POSTGRES_PASSWORD: password
      POSTGRES_DB: audio
    volumes:
      - data:/var/lib/postgresql
  minio:
    image: minio/minio
    environment:
      - MINIO_ROOT_USER=root
      - MINIO_ROOT_PASSWORD=passwordroot
      - MINIO_DEFAULT_BUCKETS=audio
    networks:
      - minio-network
    volumes:
      - minio-volume:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    command: [ "server", "--console-address", ":9001", "/data" ]

volumes:
  data:
  minio-volume:
    driver: local

networks:
  minio-network:
    driver: bridge
