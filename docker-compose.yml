version: '3'

services:
  database:
    restart: always
    image: postgres:18
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - data:/var/lib/postgresql
    networks:
      - backend-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U username -d audio"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  minio:
    restart: always
    image: minio/minio
    environment:
      - MINIO_ROOT_USER=${S3_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${S3_SECRET_KEY}
      - MINIO_DEFAULT_BUCKETS=${S3_BUCKET_NAME}
    networks:
      - minio-network
      - backend-network
    volumes:
      - minio-volume:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    command: [ "server", "--console-address", ":9001", "/data" ]

  backend:
    restart: always
    image: fabreantoine/audio-backend:latest
    ports:
      - 3333:3333
    env_file: .env
    depends_on:
      database:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - backend-network
      - minio-network

  frontend:
    restart: always
    image: fabreantoine/audio-frontend:latest
    ports:
      - 3000:3000
    env_file: .env
    depends_on:
      database:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - backend-network

volumes:
  data:
  minio-volume:
    driver: local

networks:
  minio-network:
    driver: bridge
  backend-network:
    driver: bridge
